# Builds the WhatsApp Bridge tray app (Tauri v2) for macOS and Windows.
#
# Per platform:
#   1. Compile the daemon (src/index.ts) to a self-contained binary with
#      `bun build --compile` — end machines need no Node.
#   2. Smoke-test: typecheck the repo, then boot the compiled binary in an
#      empty temp home and assert the startup banner appears (with no auth it
#      sits waiting for a QR — that IS success; we kill it after).
#   3. Build the Tauri app (unsigned — no signing secrets configured) and
#      upload the installers as workflow artifacts.
#
# The Tauri steps are skipped automatically until app/src-tauri exists on main.

name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            triple: aarch64-apple-darwin
            bun-target: bun-darwin-arm64
            bin-ext: ""
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            bun-target: bun-windows-x64
            bin-ext: ".exe"

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install root dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Compile sidecar daemon (bun build --compile)
        run: |
          mkdir -p app/src-tauri/binaries
          bun build --compile --target=${{ matrix.bun-target }} src/index.ts \
            --outfile app/src-tauri/binaries/wa-bridge-daemon-${{ matrix.triple }}${{ matrix.bin-ext }}

      - name: Smoke-test compiled daemon
        env:
          BIN: app/src-tauri/binaries/wa-bridge-daemon-${{ matrix.triple }}${{ matrix.bin-ext }}
        run: |
          set -x
          SMOKE_HOME="$(mktemp -d)"
          cd "$SMOKE_HOME"
          BIN_ABS="$GITHUB_WORKSPACE/$BIN"

          if grep -rq "WA_SMOKE" "$GITHUB_WORKSPACE/src"; then
            # Daemon has a dedicated smoke flag: must exit 0 on its own.
            WA_SMOKE=1 WA_BRIDGE_HOME="$SMOKE_HOME" QR_AUTO_OPEN=false "$BIN_ABS" | tee smoke.log
          else
            # No smoke flag: boot it, wait, assert the startup banner, kill it.
            # With no auth it sits waiting for a QR — that IS success.
            WA_BRIDGE_HOME="$SMOKE_HOME" QR_AUTO_OPEN=false CREATE_GROUP=false \
              "$BIN_ABS" > smoke.log 2>&1 &
            DAEMON_PID=$!
            sleep 15
            kill "$DAEMON_PID" 2>/dev/null || true
            cat smoke.log
            grep -Eiq "Provider|Control API|Scan this QR" smoke.log
          fi

      - name: Setup Rust
        if: hashFiles('app/src-tauri/tauri.conf.json') != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache cargo
        if: hashFiles('app/src-tauri/tauri.conf.json') != ''
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install app dependencies
        if: hashFiles('app/src-tauri/tauri.conf.json') != ''
        run: |
          cd app
          if [ -f bun.lock ] || [ -f bun.lockb ]; then bun install --frozen-lockfile
          elif [ -f package-lock.json ]; then npm ci
          elif [ -f package.json ]; then bun install
          fi

      - name: Build Tauri app (unsigned)
        if: hashFiles('app/src-tauri/tauri.conf.json') != ''
        run: |
          cd app
          npx tauri build
        env:
          # No signing on CI: ad-hoc sign on macOS, skip updater signing.
          APPLE_SIGNING_IDENTITY: "-"
          CI: "true"

      - name: Package .app as tar.gz (macOS)
        if: matrix.os == 'macos-latest' && hashFiles('app/src-tauri/tauri.conf.json') != ''
        run: |
          cd app/src-tauri/target/release/bundle/macos
          for APP in *.app; do
            tar -czf "${APP%.app}.app.tar.gz" "$APP"
          done

      - name: Upload installers (macOS)
        if: matrix.os == 'macos-latest' && hashFiles('app/src-tauri/tauri.conf.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-bridge-macos-aarch64
          if-no-files-found: error
          path: |
            app/src-tauri/target/release/bundle/dmg/*.dmg
            app/src-tauri/target/release/bundle/macos/*.app.tar.gz

      - name: Upload installers (Windows)
        if: matrix.os == 'windows-latest' && hashFiles('app/src-tauri/tauri.conf.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-bridge-windows-x64
          if-no-files-found: error
          path: |
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/nsis/*.exe
